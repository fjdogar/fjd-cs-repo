name: Update Plugins Test

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-plugins:
    runs-on: ubuntu-latest

    steps:
    # UPGRADED: v6 runs natively on Node 24
    - name: Checkout repository
      uses: actions/checkout@v6

    # UPGRADED: v6 runs natively on Node 24
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Bi-Monthly Log Reset
      run: |
        CURRENT_DAY=$(date +%d)
        CURRENT_MONTH=$(date +%m)
        if [ "$CURRENT_DAY" = "01" ] && [ $((10#$CURRENT_MONTH % 2)) -eq 0 ]; then
          echo "--- Log automatically reset ---" > update_log.txt
        else
          echo "Conditions for reset not met."
        fi

    - name: Run update script
      run: python update_repo.py

    # Native Git commands bypass the Node runtime entirely
    - name: Commit and push updated files
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        
        git add plugins.json update_log.txt
        
        if ! git diff --cached --quiet; then
          git commit -m "chore: auto-update plugins file and logs"
          git push
        else
          echo "No changes detected in plugins or logs. Skipping commit."
        fi
