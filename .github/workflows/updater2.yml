name: Update Plugins v0.3

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-plugins:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v6

    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Bi-Monthly Log Reset
      run: |
        CURRENT_DAY=$(date +%d)
        CURRENT_MONTH=$(date +%m)
        if [ "$CURRENT_DAY" = "01" ] && [ $((10#$CURRENT_MONTH % 2)) -eq 0 ]; then
          echo "--- Log automatically reset ---" > update_log.txt
        else
          echo "Conditions for reset not met."
        fi

    - name: Run update script
      run: python update_repo.py

    - name: Commit and push updated plugins file
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "chore: auto-update plugins file and logs"
        file_pattern: 'plugins.json update_log.txt'
